spring.application.name=SpringBootBackend
#configure server port with different id
server.port=${PORT:8080}
#configure db properties
spring.datasource.url=${postgresql://fsadproject_user:Iq2SbR2BUpcyG939qhHy2mmd8nwC5yZB@dpg-d7o6f7nlk1mc73ciu5c0-a/fsadproject}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql= true
spring.jpa.hibernate.ddl-auto=update

# SMTP configuration for OTP email
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# If false, app logs OTP to backend console when SMTP is unavailable (dev-friendly)
auth.otp.mail-required=${AUTH_OTP_MAIL_REQUIRED:false}

# JWT configuration
jwt.secret=${JWT_SECRET:my-default-jwt-secret-key-please-change-in-production-1234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
